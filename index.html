<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multilingual Text Replacer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    textarea, input {
      width: calc(100% - 120px);
      margin-bottom: 15px;
      padding: 10px;
      font-size: 16px;
      display: inline-block;
    }
    button {
      width: 90px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      padding: 10px;
      font-size: 14px;
      display: inline-block;
    }
    button:hover {
      background-color: #45a049;
    }
    .blue-section {
      background-color: #cce5ff;
      padding: 15px;
      border-radius: 8px;
    }
    .yellow-section {
      background-color: #fff3cd;
      padding: 15px;
      border-radius: 8px;
    }
    .green-section {
      background-color: #d4edda;
      padding: 15px;
      border-radius: 8px;
    }
    .result-box {
      background: #b2dfdb;
      border: 1px solid #157347;
      min-height: 100px;
      max-height: 200px;
      padding: 10px;
      font-size: 16px;
      white-space: pre-wrap;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    #copyNotification {
      display: none;
      color: #fff;
      background: #4CAF50;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 14px;
      text-align: center;
    }
    .section {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

<h2>Multilingual Text Replacer Tool</h2>

<div class="section blue-section">
  <label for="replacementPairs">Enter replacements:</label>
  <input id="replacementPairs" placeholder="e.g., 罗南= Luo Nan , 你好= Hello">
  <button onclick="pasteReplacement()">Paste</button>
  <button onclick="selectAll('replacementPairs')">Select All</button>
</div>

<div class="section yellow-section">
  <label for="contentInput">Enter the content:</label>
  <textarea id="contentInput" rows="6" placeholder="输入需要处理的文本..."></textarea>
  <button onclick="pasteContent()">Paste</button>
  <button onclick="selectAll('contentInput')">Select All</button>
</div>

<div class="section">
  <label for="charLimit">Set Character Limit (Excluding Parentheses Content):</label>
  <input type="number" id="charLimit" value="3500" min="500">
</div>

<div class="section green-section">
  <h3>Result:</h3>
  <button onclick="replaceWords()">Replace Words</button>
  <div id="resultContainer"></div>
  <div id="copyNotification">Copied to clipboard!</div>
</div>

<script>
function replaceSpecialCharacters(str) {
  return str.replace(/[.*+?^=!${}()|\/]/g, '\\$&');
}

function replaceWords() {
  const pairsInput = document.getElementById('replacementPairs').value;
  const content = document.getElementById('contentInput').value;
  const charLimit = parseInt(document.getElementById('charLimit').value, 10) || 3500;

  const replacements = pairsInput.split(',').reduce((acc, pair) => {
    const idx = pair.indexOf('=');
    if (idx !== -1) {
      const key = pair.slice(0, idx).trim();
      const value = pair.slice(idx + 1); // KEEP leading space
      if (key) acc[key] = value;
    }
    return acc;
  }, {});

  let replacedContent = content;
  for (const [word, replacement] of Object.entries(replacements)) {
    const escapedWord = replaceSpecialCharacters(word);
    const regex = new RegExp(escapedWord, 'g');
    replacedContent = replacedContent.replace(regex, replacement);
  }

  const resultContainer = document.getElementById('resultContainer');
  resultContainer.innerHTML = '';

  const paragraphs = replacedContent
    .split('\n')
    .filter(p => p.trim().length > 0); // DO NOT trim content

  let currentChunk = '';
  let currentLen = 0;
  const chunks = [];

  paragraphs.forEach(p => {
    const visibleLen = p.replace(/.*?/g, '').length;
    if (currentLen + visibleLen + 1 <= charLimit) {
      currentChunk += (currentChunk ? '\n' : '') + p;
      currentLen += visibleLen + 1;
    } else {
      chunks.push(currentChunk);
      currentChunk = p;
      currentLen = visibleLen;
    }
  });

  if (currentChunk) chunks.push(currentChunk);

  chunks.forEach(chunk => {
    const box = document.createElement('div');
    box.className = 'result-box';
    box.innerText = chunk;
    resultContainer.appendChild(box);
  });
}

function pasteReplacement() {
  navigator.clipboard.readText().then(text => {
    if (!text) {
      showNotification("Clipboard is empty!", true);
      return;
    }

    const lines = text
      .split(/\r?\n/)
      .map(l => l.trim())
      .filter(Boolean);

    const flattened = lines
      .map(line => line.endsWith(',') ? line : line + ',')
      .join(' ');

    document.getElementById('replacementPairs').value = flattened;
    showNotification("Content pasted successfully!");
  }).catch(() => {
    showNotification("Paste failed.", true);
  });
}

function pasteContent() {
  navigator.clipboard.readText().then(text => {
    if (text) {
      document.getElementById('contentInput').value = text;
      showNotification("Content pasted successfully!");
    }
  });
}

function selectAll(id) {
  document.getElementById(id).select();
}

function showNotification(msg, isError = false) {
  const n = document.getElementById('copyNotification');
  n.innerText = msg;
  n.style.backgroundColor = isError ? '#f44336' : '#4CAF50';
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 2000);
}
</script>

</body>
</html>
