<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multilingual Text Replacer Tool</title>

  <!-- JSZip for EPUB handling -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea, input { width: calc(100% - 120px); margin-bottom: 15px; padding: 10px; font-size: 16px; display: inline-block; }
    button { width: 90px; background-color: #4CAF50; color: white; border: none; cursor: pointer; padding: 10px; font-size: 14px; display: inline-block; }
    button:hover { background-color: #45a049; }
    .blue-section, .yellow-section, .green-section { padding: 15px; border-radius: 8px; }
    .blue-section { background-color: #cce5ff; }
    .yellow-section { background-color: #fff3cd; }
    .green-section { background-color: #d4edda; }
    .result-box { background: #b2dfdb; border: 1px solid #157347; min-height: 100px; max-height: 200px; padding: 10px; font-size: 16px; white-space: pre-wrap; overflow-y: auto; margin-bottom: 10px; }
    #copyNotification { display: none; color: #fff; background: #4CAF50; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 14px; text-align: center; }
    .tabs { display: flex; margin-bottom: 20px; }
    .tab { flex: 1; text-align: center; padding: 10px; background-color: #ddd; cursor: pointer; border: 1px solid #aaa; }
    .tab.active { background-color: #4CAF50; color: white; }
    .section { margin-bottom: 30px; }
    /* removal area styling (light ash gray) */
    .toggle-container { margin-top: 15px; background-color: #f5f5f5; padding: 12px; border-radius: 8px; }
    .toggle-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; padding: 6px 4px; }
    .toggle-icon { font-size: 18px; margin-left: 8px; }
    .toggle-content { display: none; margin-top: 10px; }

    /* EPUB preview and controls */
    .preview-box { border: 1px solid #bbb; border-radius: 6px; padding: 10px; max-height: 320px; overflow:auto; background:#fff; }
    .small { font-size:13px; padding:6px 8px; }
    .inline { display:inline-block; vertical-align:middle; }
    .label { display:inline-block; width:220px; }
  </style>
</head>
<body>
  <h2>Multilingual Text Replacer Tool</h2>

  <div class="tabs">
    <div class="tab active" id="tab1" onclick="switchTab(1)">Word Tool</div>
    <div class="tab" id="tab2" onclick="switchTab(2)">Epub Editor</div>
  </div>

  <!-- TAB 1 (UNCHANGED) -->
  <div id="tab1Content">
    <div class="section blue-section">
      <label for="replacementPairs">Enter replacements:</label>
      <input id="replacementPairs" placeholder="e.g., 罗南= Luo Nan , 你好= Hello ">
      <button onclick="pasteReplacement()">Paste</button>
      <button onclick="selectAll('replacementPairs')">Select All</button>
    </div>

    <div class="section yellow-section">
      <label for="contentInput">Enter the content:</label>
      <textarea id="contentInput" rows="6" placeholder="输入需要处理的文本..."></textarea>
      <button onclick="pasteContent()">Paste</button>
      <button onclick="selectAll('contentInput')">Select All</button>
    </div>

    <div class="section">
      <label for="charLimit">Set Character Limit (Excluding Parentheses Content):</label>
      <input type="number" id="charLimit" placeholder="Enter character limit" value="3500" min="500">
    </div>

    <div class="section green-section">
      <h3>Result:</h3>
      <button class="replace-button" onclick="processText()">Replace Words</button>
      <div id="resultContainer"></div>
      <div id="copyNotification">Copied to clipboard!</div>
    </div>

    <!-- Word Remover Inputs (light ash gray background) -->
    <div class="toggle-container">
      <div class="toggle-header" onclick="toggleVisibility('headnoteBox', this)">
        <span>Headnote to Remove</span>
        <!-- default: hidden => down arrow -->
        <span class="toggle-icon">&#9660;</span>
      </div>
      <div id="headnoteBox" class="toggle-content">
        <input id="headnoteRemove" placeholder="Text for headnote removal">
      </div>

      <div class="toggle-header" onclick="toggleVisibility('contentBox', this)">
        <span>Content to Remove</span>
        <span class="toggle-icon">&#9660;</span>
      </div>
      <div id="contentBox" class="toggle-content">
        <input id="contentRemove" placeholder="Text for content removal">
      </div>

      <div class="toggle-header" onclick="toggleVisibility('footnoteBox', this)">
        <span>Footnote to Remove</span>
        <span class="toggle-icon">&#9660;</span>
      </div>
      <div id="footnoteBox" class="toggle-content">
        <input id="footnoteRemove" placeholder="Text for footnote removal">
      </div>
    </div>
  </div>

  <!-- TAB 2 (EPUB EDITOR) - ADDED, Word Tool is unchanged -->
  <div id="tab2Content" style="display:none;">
    <div class="section blue-section">
      <label for="epubFile">Upload EPUB:</label>
      <input id="epubFile" type="file" accept=".epub">
      <div style="margin-top:8px;">
        <span id="epubFileName" style="font-style:italic"></span>
      </div>
    </div>

    <div class="section blue-section">
      <label for="epubReplacementPairs">Enter replacements (EPUB):</label>
      <textarea id="epubReplacementPairs" rows="3" placeholder="罗南= Luo Nan ,&#10;你好= Hello,&#10;(multiple lines allowed)"></textarea>
      <div style="margin-top:6px;">
        <button onclick="pasteReplacementTo('epubReplacementPairs')">Paste</button>
        <button onclick="selectAll('epubReplacementPairs')">Select All</button>
      </div>
    </div>

    <div class="toggle-container" id="epubRemoverContainer">
      <div class="toggle-header" style="justify-content:space-between; align-items:center;">
        <span style="font-weight:700">Word Remover (EPUB)</span>
        <div>
          <button onclick="toggleVisibility('epubRemoverBlock', this)">Show/Hide</button>
        </div>
      </div>

      <div id="epubRemoverBlock">
        <div class="toggle-header" onclick="toggleVisibility('epubHeadnoteBox', this)">
          <span>Headnote to Remove</span>
          <span class="toggle-icon" id="epubHeadnoteIcon">&#9660;</span>
        </div>
        <div id="epubHeadnoteBox" class="toggle-content">
          <input id="epubHeadnoteRemove" placeholder="Headnote marker (case-sensitive)">
        </div>

        <div class="toggle-header" onclick="toggleVisibility('epubContentBox', this)">
          <span>Content to Remove (multi-line)</span>
          <span class="toggle-icon" id="epubContentIcon">&#9660;</span>
        </div>
        <div id="epubContentBox" class="toggle-content">
          <textarea id="epubContentRemove" rows="4" placeholder="Enter one pattern per line (case-sensitive)"></textarea>
        </div>

        <div class="toggle-header" onclick="toggleVisibility('epubFootnoteBox', this)">
          <span>Footnote to Remove</span>
          <span class="toggle-icon" id="epubFootnoteIcon">&#9660;</span>
        </div>
        <div id="epubFootnoteBox" class="toggle-content">
          <input id="epubFootnoteRemove" placeholder="Footnote marker (case-sensitive)">
        </div>
      </div>
    </div>

    <div class="section green-section">
      <h3>Preview & TTS</h3>
      <div style="margin-bottom:8px;">
        <button onclick="processEpub()">Process EPUB (Removals → Replace)</button>
        <button onclick="downloadEditedEpub()" style="background:#2b6fb2">Download Edited EPUB</button>
      </div>

      <div style="margin-bottom:8px;">
        <label class="label inline">TTS Speed</label>
        <input id="epubTtsSpeed" type="range" min="0.5" max="2.0" step="0.1" value="1.0" style="width:200px; vertical-align:middle;">
        <span id="epubTtsSpeedValue">1.0x</span>
      </div>

      <div style="margin-bottom:8px;">
        <button onclick="epubTtsPlay()">Play</button>
        <button onclick="epubTtsPause()">Pause</button>
        <button onclick="togglePreviewVisibility()">Hide Preview</button>
      </div>

      <div id="epubPreviewContainer" class="preview-box" style="margin-top:10px;"></div>
    </div>
  </div>

  <script>
    /* ---------------- Tab switching ---------------- */
    function switchTab(tabNumber) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('[id$="Content"]').forEach(c => c.style.display = 'none');
      document.getElementById('tab' + tabNumber).classList.add('active');
      document.getElementById('tab' + tabNumber + 'Content').style.display = 'block';
    }

    /* ---------------- Word Tool functions (UNCHANGED) ---------------- */
    function toggleVisibility(id, header) {
      const box = document.getElementById(id);
      const icon = header ? header.querySelector('.toggle-icon') : null;
      if (!box) return;
      const isHidden = box.style.display === '' || box.style.display === 'none';
      if (isHidden) {
        box.style.display = 'block';
        if (icon) icon.innerHTML = '&#9650;'; // up
      } else {
        box.style.display = 'none';
        if (icon) icon.innerHTML = '&#9660;'; // down
      }
    }

    function replaceSpecialCharacters(str) {
      return str.replace(/[.*+?^=!${}()|\/]/g, '\\$&');
    }

    function processText() {
      let content = document.getElementById('contentInput').value;
      const headnote = document.getElementById('headnoteRemove').value.trim();
      const contentRemove = document.getElementById('contentRemove').value.trim();
      const footnote = document.getElementById('footnoteRemove').value.trim();
      const pairsInput = document.getElementById('replacementPairs').value;
      const charLimit = parseInt(document.getElementById('charLimit').value, 10) || 3500;

      // 1. Word Remover (case-sensitive)
      if (headnote && content.includes(headnote)) {
        content = content.substring(content.indexOf(headnote) + headnote.length);
      }
      if (contentRemove) {
        const regex = new RegExp(contentRemove, 'g');
        content = content.replace(regex, '');
      }
      if (footnote && content.includes(footnote)) {
        content = content.substring(0, content.indexOf(footnote));
      }

      // 2. Word Replacer
      const replacements = pairsInput.split(',').reduce((acc, pair) => {
        const [key, value] = pair.split('=');
        if (key && value) acc[key.trim()] = value.trim();
        return acc;
      }, {});
      for (const [word, replacement] of Object.entries(replacements)) {
        const escapedWord = replaceSpecialCharacters(word);
        const regex = new RegExp(escapedWord, 'g');
        content = content.replace(regex, replacement);
      }

      // 3. Chunking & display
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.innerHTML = '';
      const paragraphs = content.split('\n').map(p => p.trim()).filter(p => p.length > 0);
      let currentChunk = '';
      let currentChunkVisibleLength = 0;
      let chunkList = [];
      paragraphs.forEach(paragraph => {
        const paragraphWithoutParentheses = paragraph.replace(/.*?/g, '');
        const visibleLength = paragraphWithoutParentheses.length;

        if (currentChunkVisibleLength + visibleLength + 1 <= charLimit) {
          currentChunk += (currentChunk ? '\n' : '') + paragraph;
          currentChunkVisibleLength += visibleLength + 1;
        } else {
          chunkList.push(currentChunk);
          currentChunk = paragraph;
          currentChunkVisibleLength = visibleLength;
        }
      });
      if (currentChunk) chunkList.push(currentChunk);
      chunkList.forEach((chunk, index) => resultContainer.appendChild(createResultBox(chunk, index + 1)));
    }

    function createResultBox(text, boxNumber) {
      const container = document.createElement('div');
      container.style.position = 'relative';
      const resultBox = document.createElement('div');
      resultBox.classList.add('result-box');
      const copyButton = document.createElement('button');
      copyButton.innerText = `Copy ${boxNumber}`;
      copyButton.onclick = function () {
        copyToClipboard(resultBox);
        resultBox.style.display = 'none';
        arrowDownButton.style.display = 'inline-block';
      };
      const content = document.createElement('div');
      const paragraphs = text.split('\n');
      paragraphs.forEach(paragraph => {
        const para = document.createElement('p');
        para.innerText = paragraph;
        content.appendChild(para);
      });
      resultBox.appendChild(content);
      const arrowDownButton = document.createElement('button');
      arrowDownButton.innerHTML = '&#9660;';
      arrowDownButton.style.display = 'none';
      arrowDownButton.onclick = function () {
        resultBox.style.display = 'block';
        arrowDownButton.style.display = 'none';
      };
      container.appendChild(copyButton);
      container.appendChild(resultBox);
      container.appendChild(arrowDownButton);
      return container;
    }

    function copyToClipboard(resultBox) {
      const paragraphs = resultBox.querySelectorAll('p');
      let textToCopy = '';
      paragraphs.forEach(paragraph => {
        textToCopy += paragraph.innerText + '\n\n';
      });
      textToCopy = textToCopy.trim();
      navigator.clipboard.writeText(textToCopy)
        .then(() => showNotification("Copied to clipboard!"))
        .catch(() => showNotification("Failed to copy. Try again!", true));
    }

    async function pasteReplacement() {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) return showNotification("Clipboard is empty!", true);

        // Split at the first blank line (multiple blank lines allowed)
        const parts = text.split(/\n\s*\n/);
        document.getElementById('replacementPairs').value = parts[0] || '';

        if (parts[1]) {
          const lines = parts[1].split('\n').map(l => l.trim()).filter(Boolean);
          lines.forEach(line => {
            if (line.startsWith('HEADNOTE:')) document.getElementById('headnoteRemove').value = line.replace('HEADNOTE:', '').trim();
            if (line.startsWith('CONTENT:')) document.getElementById('contentRemove').value = line.replace('CONTENT:', '').trim();
            if (line.startsWith('FOOTNOTE:')) document.getElementById('footnoteRemove').value = line.replace('FOOTNOTE:', '').trim();
          });
        }
        showNotification("Content pasted successfully!");
      } catch {
        showNotification("Paste failed. Clipboard might be empty.", true);
      }
    }

    function pasteContent() { pasteIntoField('contentInput'); }

    function pasteIntoField(id) {
      const inputField = document.getElementById(id);
      navigator.clipboard.readText()
        .then(text => {
          if (text) {
            inputField.value = text;
            showNotification("Content pasted successfully!");
          } else showNotification("Clipboard is empty!", true);
        })
        .catch(() => showNotification("Paste failed. Clipboard might be empty.", true));
    }

    function selectAll(id) { document.getElementById(id).select(); }

    function showNotification(message, isError = false) {
      const n = document.getElementById('copyNotification');
      n.innerText = message;
      n.style.backgroundColor = isError ? '#f44336' : '#4CAF50';
      n.style.display = 'block';
      setTimeout(() => n.style.display = 'none', 2000);
    }

    // ensure removal boxes hidden on load with down arrows
    document.addEventListener('DOMContentLoaded', () => {
      ['headnoteBox','contentBox','footnoteBox'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      // icons already set to down in HTML
    });

    /* ---------------- EPUB Editor code (ADDED) ---------------- */

    // Utility: escape regex literal
    function escapeRegexLiteral(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // Paste importer for EPUB replacements + remover markers
    async function pasteReplacementTo(targetId) {
      try {
        const text = await navigator.clipboard.readText();
        if (!text) return showNotification("Clipboard is empty!", true);

        const parts = text.split(/\n\s*\n/);
        document.getElementById(targetId).value = parts[0] || '';

        if (parts[1]) {
          const lines = parts[1].split('\n').map(l => l.trim()).filter(Boolean);
          lines.forEach(line => {
            if (line.startsWith('HEADNOTE:')) document.getElementById('epubHeadnoteRemove').value = line.replace('HEADNOTE:', '').trim();
            if (line.startsWith('CONTENT:')) {
              // append to multi-line textarea
              const cur = document.getElementById('epubContentRemove').value;
              document.getElementById('epubContentRemove').value = (cur ? cur + '\n' : '') + line.replace('CONTENT:', '').trim();
            }
            if (line.startsWith('FOOTNOTE:')) document.getElementById('epubFootnoteRemove').value = line.replace('FOOTNOTE:', '').trim();
          });
        }
        showNotification("Content pasted successfully!");
      } catch (e) {
        console.error(e);
        showNotification("Paste failed. Clipboard might be empty.", true);
      }
    }

    // EPUB read/write vars
    let currentZip = null;
    let originalFiles = {}; // path -> string or Uint8Array
    let contentFilePaths = []; // html/xhtml files inside epub
    let processedHtmlMap = {}; // path -> modified html string

    // Handle EPUB upload
    document.getElementById('epubFile').addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      document.getElementById('epubFileName').innerText = f.name;
      showNotification('Loading EPUB...');
      try {
        const arrayBuffer = await f.arrayBuffer();
        const zip = await JSZip.loadAsync(arrayBuffer);
        currentZip = zip;
        originalFiles = {};
        contentFilePaths = [];
        processedHtmlMap = {};

        const entries = Object.keys(zip.files);
        for (const path of entries) {
          const file = zip.files[path];
          if (file.dir) continue;
          const lower = path.toLowerCase();
          if (lower.endsWith('.xhtml') || lower.endsWith('.html') || lower.endsWith('.htm') || lower.endsWith('.xml')) {
            const txt = await file.async('string');
            originalFiles[path] = txt;
            if (lower.endsWith('.xhtml') || lower.endsWith('.html') || lower.endsWith('.htm')) {
              contentFilePaths.push(path);
            }
          } else {
            const bin = await file.async('uint8array');
            originalFiles[path] = bin;
          }
        }
        showNotification('EPUB loaded. Found ' + contentFilePaths.length + ' HTML/XHTML files.');
      } catch (err) {
        console.error(err);
        showNotification('Failed to read EPUB.', true);
      }
    });

    // Process HTML string with remover and replacements (literal, case-sensitive)
    function processHtmlString(html, headnote, contentLines, footnote, replacements) {
      let modified = html;

      // headnote removal
      if (headnote) {
        const idx = modified.indexOf(headnote);
        if (idx !== -1) modified = modified.slice(idx + headnote.length);
      }

      // content lines removal (each literal)
      if (contentLines && contentLines.length) {
        contentLines.forEach(line => {
          if (!line) return;
          const re = new RegExp(escapeRegexLiteral(line), 'g');
          modified = modified.replace(re, '');
        });
      }

      // footnote removal
      if (footnote) {
        const idx = modified.indexOf(footnote);
        if (idx !== -1) modified = modified.slice(0, idx);
      }

      // replacements
      for (const [k, v] of Object.entries(replacements)) {
        if (!k) continue;
        const re = new RegExp(escapeRegexLiteral(k), 'g');
        modified = modified.replace(re, v);
      }

      return modified;
    }

    // Parse replacement pairs (same simple parsing as Word Tool)
    function parseReplacementPairs(raw) {
      if (!raw) return {};
      const pairs = [];
      raw.split('\n').forEach(line => {
        line.split(',').forEach(part => {
          const t = part.trim();
          if (t) pairs.push(t);
        });
      });
      const map = {};
      pairs.forEach(p => {
        const idx = p.indexOf('=');
        if (idx !== -1) {
          const key = p.slice(0, idx).trim();
          const val = p.slice(idx + 1).trim();
          if (key) map[key] = val;
        }
      });
      return map;
    }

    // Process EPUB: apply remover and replacements to all content HTML/XHTML files, update preview
    async function processEpub() {
      if (!currentZip) { showNotification('No EPUB uploaded.', true); return; }

      const headnote = document.getElementById('epubHeadnoteRemove').value || '';
      const contentRaw = document.getElementById('epubContentRemove').value || '';
      const contentLines = contentRaw.split('\n').map(l=>l.trim()).filter(Boolean);
      const footnote = document.getElementById('epubFootnoteRemove').value || '';
      const replacements = parseReplacementPairs(document.getElementById('epubReplacementPairs').value || '');

      processedHtmlMap = {};
      for (const path of contentFilePaths) {
        const html = originalFiles[path];
        const modified = processHtmlString(html, headnote, contentLines, footnote, replacements);
        processedHtmlMap[path] = modified;
      }

      // Build combined preview: concatenate processed HTML fragments
      let previewCombined = '';
      for (const path of contentFilePaths) {
        previewCombined += `<div style="margin-bottom:18px;"><strong>File: ${path}</strong><hr/>` + processedHtmlMap[path] + '</div>';
      }
      document.getElementById('epubPreviewContainer').innerHTML = previewCombined || '<em>No preview content</em>';
      showNotification('EPUB processed — preview updated.');
    }

    // Download edited EPUB
    async function downloadEditedEpub() {
      if (!currentZip) { showNotification('No EPUB uploaded.', true); return; }
      showNotification('Preparing EPUB download...');
      try {
        const newZip = new JSZip();
        for (const path of Object.keys(originalFiles)) {
          if (processedHtmlMap[path]) newZip.file(path, processedHtmlMap[path]);
          else {
            const data = originalFiles[path];
            if (typeof data === 'string') newZip.file(path, data);
            else newZip.file(path, data);
          }
        }
        const blob = await newZip.generateAsync({type:'blob', compression:'DEFLATE'});
        const a = document.createElement('a');
        const fname = (document.getElementById('epubFile').files[0]?.name || 'edited.epub').replace(/\.epub$/i,'') + '-edited.epub';
        a.href = URL.createObjectURL(new Blob([blob], { type: 'application/epub+zip' }));
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        a.remove();
        showNotification('Download started.');
      } catch (err) {
        console.error(err);
        showNotification('Failed to prepare EPUB.', true);
      }
    }

    /* ---------- EPUB TTS ---------- */
    let epubSynth = window.speechSynthesis;
    let epubUtter = null;
    document.getElementById('epubTtsSpeed').addEventListener('input', (e) => {
      document.getElementById('epubTtsSpeedValue').innerText = e.target.value + 'x';
    });

    function extractPreviewText() {
      const preview = document.getElementById('epubPreviewContainer');
      return preview ? (preview.innerText || preview.textContent || '') : '';
    }

    function epubTtsPlay() {
      if (!('speechSynthesis' in window)) { showNotification('TTS not supported in this browser.', true); return; }
      const text = extractPreviewText();
      if (!text || !text.trim()) { showNotification('No preview text to read.', true); return; }
      if (epubUtter) {
        if (epubSynth.paused) { epubSynth.resume(); return; }
        epubSynth.cancel();
        epubUtter = null;
      }
      epubUtter = new SpeechSynthesisUtterance(text);
      epubUtter.rate = parseFloat(document.getElementById('epubTtsSpeed').value) || 1.0;
      epubSynth.speak(epubUtter);
    }

    function epubTtsPause() {
      if (epubSynth.speaking) epubSynth.pause();
    }

    function togglePreviewVisibility() {
      const preview = document.getElementById('epubPreviewContainer');
      if (!preview) return;
      const isHidden = preview.style.display === '' || preview.style.display === 'block';
      if (isHidden) {
        preview.style.display = 'none';
      } else {
        preview.style.display = 'block';
      }
    }

    /* Keep EPUB remover sub-boxes hidden initially */
    document.addEventListener('DOMContentLoaded', () => {
      ['headnoteBox','contentBox','footnoteBox','epubHeadnoteBox','epubContentBox','epubFootnoteBox'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
    });
  </script>
</body>
</html>
